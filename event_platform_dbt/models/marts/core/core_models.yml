version: 2

models:
  - name: dim_users
    description: "User dimension built from clean event data. Contains user-level activity and latest known attributes."

    columns:
      - name: user_id
        description: "Unique user identifier."
        tests:
          - not_null
          - unique

      - name: latest_country
        description: "Most recent country observed for the user."

      - name: latest_device
        description: "Most recent device observed for the user."

      - name: first_seen_at
        description: "First event timestamp observed for the user."

      - name: last_seen_at
        description: "Latest event timestamp observed for the user."

      - name: total_events
        description: "Total clean events generated by the user."

  - name: dim_products
    description: "Product dimension built from product-related events."

    columns:
      - name: product_id
        description: "Unique product identifier."
        tests:
          - not_null
          - unique

      - name: product_number
        description: "Numeric product identifier extracted from product_id."

      - name: total_product_events
        description: "Total clean events related to the product."

      - name: purchase_events
        description: "Number of purchase events for the product."

      - name: avg_purchase_price
        description: "Average purchase price for the product."

      - name: product_name
        description: "Product display name from the product catalog."

      - name: category
        description: "Product category from the product catalog."

      - name: brand
        description: "Product brand from the product catalog."

      - name: base_price
        description: "Catalog base price."

      - name: missing_from_catalog
        description: "True when the product appeared in event data but does not exist in the product catalog."
        tests:
          - not_null

  - name: dim_dates
    description: "Date dimension built from distinct event dates."

    columns:
      - name: event_date
        description: "Calendar date."
        tests:
          - not_null
          - unique

      - name: year
        description: "Calendar year."

      - name: month
        description: "Calendar month."

      - name: day_of_month
        description: "Day of month."

      - name: is_weekend
        description: "Boolean flag for weekend dates."

  - name: fact_events
    description: "Fact table containing one row per clean user event."

    columns:
      - name: event_id
        description: "Unique event identifier."
        tests:
          - not_null
          - unique

      - name: user_id
        description: "User identifier."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_id

      - name: event_date
        description: "Event date."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: event_date

      - name: product_id
        description: "Product identifier. Null for non-product events."

      - name: event_type
        description: "Type of event."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - view_product
                  - add_to_cart
                  - purchase
                  - login
                  - logout
                  - search

  - name: fact_purchases
    description: "Fact table containing one row per purchase event."

    columns:
      - name: purchase_event_id
        description: "Unique event identifier for the purchase."
        tests:
          - not_null
          - unique

      - name: user_id
        description: "User identifier."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_users')
                field: user_id

      - name: product_id
        description: "Purchased product identifier."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

      - name: event_date
        description: "Purchase date."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_dates')
                field: event_date

      - name: purchase_amount
        description: "Purchase amount."
        tests:
          - not_null