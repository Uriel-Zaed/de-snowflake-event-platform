name: dbt CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  dbt-parse:
    name: dbt parse
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-core==1.11.11 dbt-snowflake==1.11.5

      - name: Create temporary dbt profile
        run: |
          mkdir -p ~/.dbt

          cat > ~/.dbt/profiles.yml <<'EOF'
          event_platform_dbt:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: dummy_account
                user: dummy_user
                password: dummy_password
                role: dummy_role
                database: EVENT_PLATFORM
                warehouse: EVENT_PLATFORM_WH
                schema: DBT_CI
                threads: 4
                client_session_keep_alive: false
          EOF

      - name: Install dbt dependencies
        working-directory: event_platform_dbt
        run: dbt deps

      - name: Parse dbt project
        working-directory: event_platform_dbt
        run: dbt parse